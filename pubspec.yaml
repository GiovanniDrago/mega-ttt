name: mega_ttt
description: A full-screen tic-tac-toe game built with Flutter and Flame.
publish_to: 'none'
version: 0.1.2+102

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flame: ^1.18.0
  cupertino_icons: ^1.0.8
  http: ^1.3.0
  package_info_plus: ^9.0.1
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
