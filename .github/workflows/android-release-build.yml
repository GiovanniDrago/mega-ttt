name: Android Publish Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/release.keystore \
            -alias upload \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storetype JKS \
            -storepass android \
            -keypass android \
            -dname "CN=MegaTTT, OU=Dev, O=MegaTTT, L=Unknown, ST=Unknown, C=US" \
            -noprompt

      - name: Create key.properties
        run: |
          echo "storePassword=android" > android/key.properties
          echo "keyPassword=android" >> android/key.properties
          echo "keyAlias=upload" >> android/key.properties
          echo "storeFile=release.keystore" >> android/key.properties

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload release APK
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
